<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Minnow lip hook vs back hook diagram">
  <rect width="100%" height="100%" fill="#0f1a33"></rect>
  <text x="40" y="70" fill="#e7eefc" font-size="42" font-family="Arial">Minnow Hooking (Diagram)</text>
  <text x="40" y="120" fill="#b8c4dd" font-size="26" font-family="Arial">Lip hook for current • Back hook for freer swimming</text>

  <ellipse cx="380" cy="290" rx="180" ry="70" fill="none" stroke="#a7f3d0" stroke-width="10"></ellipse>
  <text x="300" y="200" fill="#e7eefc" font-size="26" font-family="Arial">Lip Hook</text>
  <circle cx="520" cy="290" r="10" fill="#7dd3fc"></circle>

  <ellipse cx="860" cy="290" rx="180" ry="70" fill="none" stroke="#a7f3d0" stroke-width="10"></ellipse>
  <text x="780" y="200" fill="#e7eefc" font-size="26" font-family="Arial">Back Hook</text>
  <circle cx="820" cy="260" r="10" fill="#7dd3fc"></circle>

  <text x="40" y="440" fill="#b8c4dd" font-size="22" font-family="Arial">Avoid spine area to keep bait lively.</text>
</svg>