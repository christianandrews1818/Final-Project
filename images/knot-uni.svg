<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Uni knot diagram">
  <rect width="100%" height="100%" fill="#0f1a33"></rect>
  <text x="40" y="70" fill="#e7eefc" font-size="42" font-family="Arial">Uni Knot (Diagram)</text>
  <text x="40" y="120" fill="#b8c4dd" font-size="26" font-family="Arial">Through eye → form loop → wrap tag 6–10x → snug → slide down</text>

  <circle cx="960" cy="250" r="55" stroke="#7dd3fc" stroke-width="8" fill="none"></circle>
  <text x="922" y="260" fill="#e7eefc" font-size="24" font-family="Arial">Eye</text>

  <path d="M100 250 C 420 250, 700 250, 905 250" stroke="#e7eefc" stroke-width="10" fill="none"></path>
  <path d="M905 250 C 820 260, 760 310, 740 360" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <path d="M740 360 C 720 400, 650 410, 620 360" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <text x="600" y="405" fill="#b8c4dd" font-size="22" font-family="Arial">Wraps around doubled line</text>
</svg>