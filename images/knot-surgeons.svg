<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Double surgeon's knot diagram">
  <rect width="100%" height="100%" fill="#0f1a33"></rect>
  <text x="40" y="70" fill="#e7eefc" font-size="42" font-family="Arial">Double Surgeon’s Knot (Diagram)</text>
  <text x="40" y="120" fill="#b8c4dd" font-size="26" font-family="Arial">Overlap lines → form loop → pass ends through loop twice → tighten evenly</text>

  <path d="M120 220 C 420 220, 780 220, 1080 220" stroke="#e7eefc" stroke-width="10" fill="none"></path>
  <path d="M120 280 C 420 280, 780 280, 1080 280" stroke="#a7f3d0" stroke-width="10" fill="none"></path>

  <path d="M600 210 C 520 250, 520 250, 600 290" stroke="#7dd3fc" stroke-width="10" fill="none"></path>
  <path d="M600 210 C 680 250, 680 250, 600 290" stroke="#7dd3fc" stroke-width="10" fill="none"></path>
  <text x="520" y="340" fill="#b8c4dd" font-size="22" font-family="Arial">Pass ends through loop twice</text>
</svg>