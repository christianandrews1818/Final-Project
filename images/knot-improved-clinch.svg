<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Improved clinch knot diagram">
  <rect width="100%" height="100%" fill="#0f1a33"></rect>
  <text x="40" y="70" fill="#e7eefc" font-size="42" font-family="Arial">Improved Clinch Knot (Diagram)</text>
  <text x="40" y="120" fill="#b8c4dd" font-size="26" font-family="Arial">1) Through eye → 2) Wrap 5–7x → 3) Back through small loop → 4) Through big loop → Tighten</text>

  <circle cx="980" cy="250" r="55" stroke="#7dd3fc" stroke-width="8" fill="none"></circle>
  <text x="945" y="260" fill="#e7eefc" font-size="24" font-family="Arial">Eye</text>

  <path d="M100 250 C 350 250, 520 250, 740 250" stroke="#e7eefc" stroke-width="10" fill="none"></path>
  <path d="M740 250 C 820 250, 900 250, 925 250" stroke="#e7eefc" stroke-width="10" fill="none"></path>

  <path d="M925 250 C 860 200, 830 165, 800 140" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <path d="M800 140 C 860 160, 860 220, 820 250" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <path d="M820 250 C 860 285, 860 340, 790 350" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <text x="740" y="395" fill="#b8c4dd" font-size="22" font-family="Arial">Coils (wraps)</text>

  <path d="M790 350 C 760 355, 740 340, 730 320" stroke="#7dd3fc" stroke-width="10" fill="none"></path>
  <text x="660" y="315" fill="#b8c4dd" font-size="22" font-family="Arial">Tag end through loops</text>
</svg>