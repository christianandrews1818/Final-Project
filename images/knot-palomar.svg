<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Palomar knot diagram">
  <rect width="100%" height="100%" fill="#0f1a33"></rect>
  <text x="40" y="70" fill="#e7eefc" font-size="42" font-family="Arial">Palomar Knot (Diagram)</text>
  <text x="40" y="120" fill="#b8c4dd" font-size="26" font-family="Arial">Double line → overhand knot → pass hook through loop → tighten</text>

  <circle cx="960" cy="250" r="55" stroke="#7dd3fc" stroke-width="8" fill="none"></circle>
  <text x="922" y="260" fill="#e7eefc" font-size="24" font-family="Arial">Eye</text>

  <path d="M100 230 C 420 230, 700 230, 905 250" stroke="#e7eefc" stroke-width="10" fill="none"></path>
  <path d="M100 270 C 420 270, 700 270, 905 250" stroke="#e7eefc" stroke-width="10" fill="none"></path>

  <path d="M520 180 C 520 250, 520 320, 520 380" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <path d="M520 180 C 620 220, 620 340, 520 380" stroke="#a7f3d0" stroke-width="10" fill="none"></path>
  <text x="560" y="405" fill="#b8c4dd" font-size="22" font-family="Arial">Overhand knot</text>

  <path d="M520 180 C 430 170, 380 190, 340 220" stroke="#7dd3fc" stroke-width="10" fill="none"></path>
  <text x="240" y="240" fill="#b8c4dd" font-size="22" font-family="Arial">Loop passes over hook</text>
</svg>